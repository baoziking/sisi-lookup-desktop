<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent; overflow: hidden; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; color: #1f2937; }

    .card {
      width: 490px;
      max-height: 600px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      margin: 5px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #f1f5f9;
      -webkit-app-region: drag;
    }

    .word-text { font-weight: 600; font-size: 18px; color: #1e293b; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .header-btns { display: flex; gap: 4px; -webkit-app-region: no-drag; }
    .btn-icon {
      width: 26px; height: 26px; border: none; border-radius: 6px;
      background: transparent; cursor: pointer; display: flex;
      align-items: center; justify-content: center; color: #94a3b8;
      transition: background 0.15s, color 0.15s;
    }
    .btn-icon:hover { background: #e0e7ff; color: #6366f1; }
    .btn-close:hover { background: #fee2e2; color: #ef4444; }
    .btn-icon.playing { color: #6366f1; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .body { flex: 1; overflow-y: auto; padding: 12px 14px; }

    .loading { display: flex; align-items: center; gap: 10px; color: #94a3b8; justify-content: center; padding: 30px 0; }
    .spinner { width: 16px; height: 16px; border: 2px solid #e5e7eb; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: #ef4444; padding: 8px 0; }

    /* Structured result */
    .meta-line { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .phonetic { color: #6366f1; font-size: 15px; font-family: 'Lucida Sans Unicode', sans-serif; }
    .pos { font-size: 13px; color: #94a3b8; background: #f1f5f9; padding: 2px 8px; border-radius: 4px; }
    .meaning-cn { font-size: 20px; font-weight: 600; color: #1e293b; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #f1f5f9; }

    .section { margin-bottom: 10px; padding: 6px 0; }
    .label { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
    .label-fce { color: #f59e0b; }
    .label-grammar { color: #8b5cf6; }
    .label-vocab { color: #f59e0b; }
    .en-text { font-size: 15px; color: #374151; line-height: 1.7; }
    .example { font-style: italic; color: #4b5563; }
    .cn-text { font-size: 14px; color: #6b7280; margin-top: 4px; padding: 6px 10px; background: #f8fafc; border-radius: 4px; border-left: 2px solid #e0e7ff; }
    .tip-text { font-size: 14px; color: #6b7280; line-height: 1.6; }
    .fce-tip { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; background: #fffbeb; border-radius: 6px; border: 1px solid #fef3c7; }
    .vocab-item { font-size: 14px; color: #374151; padding: 3px 0; }
    .vocab-item strong { color: #6366f1; margin-right: 4px; }

    .btn-tts-inline {
      width: 24px; height: 24px; border: none; border-radius: 5px;
      background: #f1f5f9; color: #94a3b8; cursor: pointer; flex-shrink: 0;
      font-size: 10px; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; margin-top: 2px;
    }
    .btn-tts-inline:hover { background: #e0e7ff; color: #6366f1; }
    .btn-tts-inline.playing { color: #6366f1; animation: pulse 1s infinite; }

    .footer { padding: 5px 14px; font-size: 10px; color: #cbd5e1; background: #f8fafc; border-top: 1px solid #f1f5f9; text-align: right; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="word-text" id="wordText">...</span>
      <div class="header-btns">
        <button class="btn-icon" id="ttsBtn" title="Pronounce">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="btn-icon btn-close" id="closeBtn" title="Close">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="body" id="body">
      <div class="loading"><div class="spinner"></div><span>Looking up...</span></div>
    </div>
    <div class="footer">Sisi Lookup · OpenRouter + ElevenLabs</div>
  </div>

  <script>
    const wordText = document.getElementById('wordText')
    const body = document.getElementById('body')
    const ttsBtn = document.getElementById('ttsBtn')
    const closeBtn = document.getElementById('closeBtn')
    let currentText = ''

    closeBtn.addEventListener('click', () => window.api.closeLookup())

    ttsBtn.addEventListener('click', async () => {
      if (!currentText) return
      ttsBtn.classList.add('playing')
      const resp = await window.api.tts(currentText)
      ttsBtn.classList.remove('playing')
      if (resp.audio) {
        const audio = new Audio('data:audio/mpeg;base64,' + resp.audio)
        audio.play()
      }
    })

    // Escape to close
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.api.closeLookup()
    })

    window.api.onNewLookup(async (text, scale) => {
      currentText = text
      // Apply scale to font size
      if (scale && scale !== 1) document.querySelector('.card').style.zoom = scale
      wordText.textContent = text
      body.innerHTML = '<div class="loading"><div class="spinner"></div><span>Looking up...</span></div>'

      const resp = await window.api.lookup(text)
      if (resp.error) {
        body.innerHTML = `<div class="error">${esc(resp.error)}</div>`
        return
      }

      if (resp.isText || typeof resp.result === 'string') {
        body.innerHTML = `<div class="en-text">${esc(typeof resp.result === 'string' ? resp.result : JSON.stringify(resp.result))}</div>`
        return
      }

      body.innerHTML = resp.isWord ? renderWord(resp.result) : renderSentence(resp.result)
      // Bind inline TTS buttons
      body.querySelectorAll('.btn-tts-inline').forEach(btn => {
        btn.addEventListener('click', async () => {
          const ttsText = btn.getAttribute('data-tts')
          if (!ttsText) return
          btn.classList.add('playing')
          const r = await window.api.tts(ttsText)
          btn.classList.remove('playing')
          if (r.audio) new Audio('data:audio/mpeg;base64,' + r.audio).play()
        })
      })
    })

    function renderWord(d) {
      let h = ''
      if (d.phonetic || d.pos) {
        h += `<div class="meta-line">`
        if (d.phonetic) h += `<span class="phonetic">${esc(d.phonetic)}</span>`
        if (d.pos) h += `<span class="pos">${esc(d.pos)}</span>`
        h += `</div>`
      }
      if (d.meaning_cn) h += `<div class="meaning-cn">${esc(d.meaning_cn)}</div>`
      if (d.definition_en) {
        h += `<div class="section"><span class="label">English</span><div class="en-text" style="display:flex;align-items:flex-start;gap:6px"><span style="flex:1">${esc(d.definition_en)}</span><button class="btn-tts-inline" data-tts="${esc(d.definition_en)}" title="Pronounce">&#9654;</button></div>`
        if (d.definition_cn) h += `<div class="cn-text">${esc(d.definition_cn)}</div>`
        h += `</div>`
      }
      if (d.example_en) {
        h += `<div class="section"><span class="label">Example</span><div class="en-text example" style="display:flex;align-items:flex-start;gap:6px"><span style="flex:1">${esc(d.example_en)}</span><button class="btn-tts-inline" data-tts="${esc(d.example_en)}" title="Pronounce">&#9654;</button></div>`
        if (d.example_cn) h += `<div class="cn-text">${esc(d.example_cn)}</div>`
        h += `</div>`
      }
      if (d.fce_tip) {
        h += `<div class="fce-tip"><span class="label label-fce" style="margin:0">FCE</span><span class="tip-text">${esc(d.fce_tip)}</span></div>`
      }
      return h
    }

    function renderSentence(d) {
      let h = ''
      if (d.translation) h += `<div class="section"><span class="label">翻译</span><div class="cn-text" style="display:block">${esc(d.translation)}</div></div>`
      if (d.grammar) h += `<div class="section"><span class="label label-grammar">语法</span><span class="tip-text">${esc(d.grammar)}</span></div>`
      if (d.vocab?.length) {
        h += `<div class="section"><span class="label label-vocab">词汇</span>`
        for (const v of d.vocab) h += `<div class="vocab-item"><strong>${esc(v.word)}</strong> ${esc(v.meaning)}</div>`
        h += `</div>`
      }
      if (d.pattern) h += `<div class="section"><span class="label">句型</span><span class="tip-text">${esc(d.pattern)}</span></div>`
      return h
    }

    function esc(s) {
      if (!s) return ''
      const d = document.createElement('div'); d.textContent = s; return d.innerHTML
    }
  </script>
</body>
</html>
